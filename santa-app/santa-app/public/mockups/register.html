<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Santa — Register</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        line-height: 1.6;
        color: #333;
      }

      header {
        background: #2d5a27;
        color: white;
        padding: 1rem 2rem;
      }
      header h1 {
        font-size: 1.5rem;
      }

      main {
        max-width: 480px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      main h2 {
        margin-bottom: 1rem;
        color: #2d5a27;
      }

      form {
        background: #f9f9f9;
        padding: 1.5rem;
        border-radius: 8px;
      }
      fieldset {
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 1rem;
      }
      legend {
        font-weight: bold;
        padding: 0 0.5rem;
        color: #2d5a27;
      }
      label {
        display: block;
        margin-top: 0.75rem;
        font-weight: 500;
      }
      input {
        display: block;
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
      }
      button[type='submit'] {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0.6rem 1.5rem;
        background: #2d5a27;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
      }
      button[type='submit']:hover {
        background: #1e3d1a;
      }

      footer {
        text-align: center;
        padding: 1.5rem 1rem;
        color: #555;
      }
      footer a {
        color: #2d5a27;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Secret Santa</h1>
    </header>

    <main>
      <h2>Create Account</h2>

      <form method="POST" action="/auth/register">
        <fieldset>
          <legend>Account details</legend>

          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required />

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 8 characters"
            minlength="8"
            required
          />

          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            placeholder="Repeat your password"
            minlength="8"
            required
          />
        </fieldset>

        <button type="submit">Create Account</button>
      </form>
    </main>

    <footer>
      <p>Already have an account? <a href="login.html">Sign in</a></p>
    </footer>
  </body>
</html>
