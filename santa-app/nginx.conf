server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache hashed static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: client-side routes (e.g. /rooms/:id) resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
