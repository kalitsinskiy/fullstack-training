<!--
login.html — a login page with:

<title> "Secret Santa — Login"
Semantic structure: <header> (with <h1> "Secret Santa") → <main> → <footer>
<main> contains an <h2> "Welcome Back"
A <form method="POST" action="/auth/login"> with a <fieldset> + <legend> "Sign in":
email input (type="email", required, <label>, id/for matching, name, placeholder)
password input (type="password", required, minlength="8", <label>, ...)
<button type="submit"> "Sign In"
A link "Don't have an account? Register" pointing to register.html
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secret Santa — organize gift exchanges with friends and colleagues">
  <title>Secret Santa — Login</title>
  <style>
    /* Minimal styling just to make the structure visible */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #333; background: #f9f9f9; }
    header { background: #2d5a27; color: white; padding: 1rem 2rem; }
    header h1 { font-size: 1.5rem; }
    main { max-width: 400px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    main h2 { margin-bottom: 1.5rem; color: #2d5a27; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    fieldset { border: 1px solid #ccc; border-radius: 6px; padding: 1rem; }
    legend { font-weight: bold; padding: 0 0.5rem; color: #2d5a27; }
    label { display: block; margin-top: 0.75rem; font-weight: 500; }
    input { display: block; width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    button { margin-top: 1rem; padding: 0.6rem 1.5rem; background: #2d5a27; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1e3d1a; }
    .register-link { margin-top: 1rem; text-align: center; }
    .register-link a { color: #2d5a27; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Secret Santa</h1>
  </header>

  <main>
    <h2>Welcome Back</h2>
    <form method="POST" action="/auth/login">
      <fieldset>
        <legend>Sign in</legend>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
      </fieldset>
      <button type="submit">Sign In</button>
    </form>
    <div class="register-link">
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </main>
</body>
</html>
