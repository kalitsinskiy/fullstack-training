<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Santa - Register</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Secret Santa</h1>
    </header>

    <main>
      <div class="auth-card">
        <h2>Create Account</h2>
        <form action="/auth/register" method="POST">
          <fieldset>
            <legend>Account details</legend>
            <label for="nameField">Name</label>
            <input
              type="text"
              name="displayName"
              id="nameField"
              placeholder="Display Name"
              required
            />
            <label for="emailField">Email</label>
            <input type="email" name="email" id="emailField" placeholder="Valid Email" required />
            <label for="passwordField">Password</label>
            <input
              type="password"
              name="password"
              id="passwordField"
              placeholder="Password"
              minlength="8"
              required
            />
            <label for="passwordConfirmField">Confirm Password</label>
            <input
              type="password"
              name="passwordConfirm"
              id="passwordConfirmField"
              placeholder="Confirm password"
              minlength="8"
              required
            />
          </fieldset>
          <button type="submit" class="btn">Create Account</button>
          <p>Already have an account? <a href="login.html">Sign in</a></p>
        </form>
      </div>
    </main>

    <footer class="footer">
      <p class="copyright">
        &copy; 2026 Secret Santa App &middot; <a href="#privacy">Privacy</a> &middot;
        <a href="#terms">Terms</a>
      </p>
    </footer>
  </body>
</html>
