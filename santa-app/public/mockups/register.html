<!--
register.html — a registration page with:

<title> "Secret Santa — Register"
Same <header> / <main> / <footer> structure
<main> contains an <h2> "Create Account"
A <form method="POST" action="/auth/register"> with a <fieldset> + <legend> "Account details":
name (type="text", required)
email (type="email", required)
password (type="password", required, minlength="8")
confirm password (type="password", required, minlength="8")
submit button "Create Account"
A link "Already have an account? Sign in" pointing to login.html

Match what exercises/registration-page.html already trained — <fieldset> + <legend>, every input labeled, validation attributes set. Same standard everywhere in the course.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secret Santa — organize gift exchanges with friends and colleagues">
  <title>Secret Santa — Register</title>
  <style>
    /* Minimal styling just to make the structure visible */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #333; background: #f9f9f9; }
    header { background: #2d5a27; color: white; padding: 1rem 2rem; }
    header h1 { font-size: 1.5rem; }
    main { max-width: 400px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    main h2 { margin-bottom: 1.5rem; color: #2d5a27; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    fieldset { border: 1px solid #ccc; border-radius: 6px; padding: 1rem; }
    legend { font-weight: bold; padding: 0 0.5rem; color: #2d5a27; }
    label { display: block; margin-top: 0.75rem; font-weight: 500; }
    input { display: block; width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    button { margin-top: 1rem; padding: 0.6rem 1.5rem; background: #2d5a27; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1e3d1a; }
    .login-link { margin-top: 1rem; text-align: center; }
    .login-link a { color: #2d5a27; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Secret Santa</h1>
  </header>
  <main>
    <h2>Create Account</h2>
    <form method="POST" action="/auth/register">
      <fieldset>
        <legend>Account details</legend>

        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="john.doe@example.com">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" required minlength="8" placeholder="Re-enter your password">
      </fieldset>
      <button type="submit">Create Account</button>
    </form>
    <div class="login-link">
      <p>Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </main>
</body>
</html>
