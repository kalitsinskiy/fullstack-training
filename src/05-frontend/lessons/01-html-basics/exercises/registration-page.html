<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Santa — Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--
    TODO: Build a user registration page with semantic HTML.

    Requirements:

    1. HEADER
       - Add a <header> element
       - Inside it, add an <h1> with the text "Secret Santa"
    -->
    <header class="header">
      <h1>Secret Santa</h1>
    </header>

    <!-- 2. MAIN CONTENT
       - Add a <main> element
       - Inside it, add:
         a) An <h2> with the text "Create Account"
         b) A <form> with method="POST" and action="/register"
         c) Inside the form, add a <fieldset> with <legend> "Account Details"
         d) Inside the fieldset, add these labeled inputs:
            - Full Name (type="text", required)
            - Email Address (type="email", required)
            - Password (type="password", required, minlength="8")
            - Confirm Password (type="password", required, minlength="8")
         e) Each input MUST have:
            - A <label> element with a "for" attribute
            - An "id" attribute matching the label's "for"
            - A "name" attribute
            - A "placeholder" attribute
         f) A <button type="submit"> with text "Create Account"
         -->
    <main>
      <h2 class="page-title">Create Account</h2>

      <form action="/register" method="POST">
        <fieldset>
          <legend>Account Details</legend>
          <label for="nameField">Full Name:</label>
          <input type="text" name="name" id="nameField" required placeholder="Full Name" />
          <label for="emailField">Email:</label>
          <input type="email" name="email" id="emailField" required placeholder="Email" />
          <label for="passwordField">Password:</label>
          <input
            type="password"
            name="password"
            id="passwordField"
            required
            minlength="8"
            placeholder="Password"
          />
          <label for="confirmPasswordField">Confirm Password</label>
          <input
            type="password"
            name="confirmPassword"
            id="confirmPasswordField"
            required
            minlength="8"
            placeholder="Password"
          />
        </fieldset>

        <button type="submit" class="btn">Create account</button>
      </form>
    </main>

    <!-- 3. FOOTER
       - Add a <footer> element
       - Inside it, add a <p> with text: "Already have an account?"
         followed by an <a> link to "login.html" with text "Log in"
    -->
    <footer class="footer">
      <p class="copyright">
        Already have an account?<br />
        <a href="/login.html">Log in</a>
      </p>
    </footer>

    <!-- 4. ACCESSIBILITY
       - Make sure all inputs have labels
       - Use semantic elements (header, main, footer, fieldset, legend)
       - Add a descriptive <title> in the <head>

    Hints:
    - Look at examples/forms.html for form patterns
    - Look at examples/semantic-page.html for page structure
    - Open this file in a browser to test — the form should show
      built-in validation when you click Submit with empty required fields
  --></body>
</html>
