# Secret Santa — full stack (infra + backend services)
# Run:        docker compose up --build
# Stop:       docker compose down
# Reset data: docker compose down -v
#
# The React client (santa-app) runs separately with Vite for hot-reload:
#   cd santa-app && npm install && npm run dev   (http://localhost:5173)
#   point it at the API with VITE_API_URL=http://localhost:3001 in santa-app/.env

name: santa

services:
  # --- Databases ---

  mongodb:
    image: mongo:8
    container_name: santa-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: santa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Message Broker ---

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: santa-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: santa
      RABBITMQ_DEFAULT_PASS: santa123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend Services ---
  # Build from each service's Dockerfile. Hostnames are the service names below
  # (mongodb / redis / rabbitmq), resolved over the compose network.

  santa-api:
    build:
      context: ./santa-api
      dockerfile: Dockerfile
    container_name: santa-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_URL: mongodb://mongodb:27017/santa-api
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://santa:santa123@rabbitmq:5672
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRATION: 7d
      SERVICE_API_KEY: dev-service-key-change-in-production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  santa-notifications:
    build:
      context: ./santa-notifications
      dockerfile: Dockerfile
    container_name: santa-notifications
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URL: mongodb://mongodb:27017/santa-notifications
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://santa:santa123@rabbitmq:5672
      CORS_ORIGIN: http://localhost:5173
      SANTA_API_URL: http://santa-api:3001
      JWT_SECRET: dev-secret-change-in-production
      SERVICE_API_KEY: dev-service-key-change-in-production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
