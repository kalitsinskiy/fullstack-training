# Secret Santa Infrastructure
# Run: docker-compose up
# Stop: docker-compose down
# Reset data: docker-compose down -v

services:
  # --- Databases ---

  mongodb:
    image: mongo:7
    container_name: santa-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: santa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Message Broker ---

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: santa-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: santa
      RABBITMQ_DEFAULT_PASS: santa123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend Services ---
  # Uncomment these once you have Dockerfiles ready (Fullstack Lesson 01)

  santa-api:
    build:
      context: ./santa-api
    container_name: santa-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_URL: mongodb://mongodb:27017/santa-api
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      mongodb:
        condition: service_healthy

  santa-notifications:
    build:
      context: ./santa-notifications
    container_name: santa-notifications
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URL: mongodb://mongodb:27017/santa-notifications
    depends_on:
      mongodb:
        condition: service_healthy

  santa-app:
    build:
      context: ./santa-app/santa-app
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: santa-app
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - santa-api

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
